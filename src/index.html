<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComicSansCon Chat</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>ComicSansCon Chat</h1>
  </header>

  <main>
    <div id="messages">
      <div class="message user">Hola, quién eres tu</div>
      <div class="message character">Soy ...</div>
    </div>
  </main>

  <footer>
    <form id="chat-form">
      <inputs
        type="text"
        id="message-input"
        placeholder="Escribe un mensaje..."
        autocomplete="off"
      >
      <button type="submit">Enviar</button>
    </form>
  </footer>
</body>
</html>
